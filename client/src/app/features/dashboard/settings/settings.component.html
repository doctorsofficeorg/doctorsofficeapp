<div class="container-fluid py-4">
  <!-- Header -->
  <div class="mb-4">
    <h4 class="page-title mb-1">Settings</h4>
    <p class="text-muted mb-0">Manage clinic profile, branding, and doctor information</p>
  </div>

  <!-- Clinic Information -->
  <p-card styleClass="settings-card mb-4">
    <ng-template #header>
      <div class="card-header-custom">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
          <polyline points="9 22 9 12 15 12 15 22"/>
        </svg>
        <span>Clinic Information</span>
      </div>
    </ng-template>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Clinic Name</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.name" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Phone</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.phone" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Email</label>
        <input type="email" pInputText class="w-100" [(ngModel)]="clinic.email" />
      </div>
      <div class="col-md-6">
        <label class="form-label">GSTIN</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.gstin" />
      </div>
      <div class="col-12">
        <label class="form-label">Address</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.address" />
      </div>
      <div class="col-md-4">
        <label class="form-label">City</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.city" />
      </div>
      <div class="col-md-4">
        <label class="form-label">State</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.state" />
      </div>
      <div class="col-md-4">
        <label class="form-label">Pincode</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="clinic.pincode" />
      </div>
    </div>
  </p-card>

  <!-- Branding -->
  <p-card styleClass="settings-card mb-4">
    <ng-template #header>
      <div class="card-header-custom">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <circle cx="13.5" cy="6.5" r="2.5"/>
          <path d="M17.5 10.5c0 0-1.5 2-4 2s-4-2-4-2"/>
          <path d="M8.5 13.5l-3 3"/>
          <path d="M2 21l3.5-3.5"/>
          <path d="M15.5 13.5l3 3"/>
          <path d="M22 21l-3.5-3.5"/>
          <path d="M12 17v4"/>
        </svg>
        <span>Branding</span>
      </div>
    </ng-template>
    <div class="row g-3">
      <!-- Logo Upload -->
      <div class="col-12">
        <label class="form-label">Clinic Logo</label>
        <div class="logo-upload-placeholder">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <rect x="3" y="3" width="18" height="18" rx="2" ry="2"/>
            <circle cx="8.5" cy="8.5" r="1.5"/>
            <polyline points="21 15 16 10 5 21"/>
          </svg>
          <span>Click to upload logo</span>
          <span class="text-muted small">PNG, JPG up to 2MB</span>
        </div>
      </div>

      <!-- Color Inputs -->
      <div class="col-md-4">
        <label class="form-label">Primary Color</label>
        <div class="color-input-wrapper">
          <div class="color-preview" [style.background]="branding.primaryColor"></div>
          <input type="text" pInputText class="w-100 color-text-input" [(ngModel)]="branding.primaryColor" />
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Secondary Color</label>
        <div class="color-input-wrapper">
          <div class="color-preview" [style.background]="branding.secondaryColor"></div>
          <input type="text" pInputText class="w-100 color-text-input" [(ngModel)]="branding.secondaryColor" />
        </div>
      </div>
      <div class="col-md-4">
        <label class="form-label">Accent Color</label>
        <div class="color-input-wrapper">
          <div class="color-preview" [style.background]="branding.accentColor"></div>
          <input type="text" pInputText class="w-100 color-text-input" [(ngModel)]="branding.accentColor" />
        </div>
      </div>

      <!-- Theme Select -->
      <div class="col-md-4">
        <label class="form-label">Theme</label>
        <p-select [options]="themeOptions" [(ngModel)]="branding.theme" placeholder="Select theme" styleClass="w-100" />
      </div>

      <!-- Branding Preview -->
      <div class="col-12">
        <label class="form-label">Preview</label>
        <div class="branding-preview" [class.dark-preview]="branding.theme === 'dark'">
          <div class="preview-header" [style.background]="branding.primaryColor">
            <div class="preview-logo-circle">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"/>
              </svg>
            </div>
            <span class="preview-clinic-name">{{ clinic.name }}</span>
          </div>
          <div class="preview-body">
            <div class="preview-nav">
              <div class="preview-nav-item active" [style.background]="branding.primaryColor">Dashboard</div>
              <div class="preview-nav-item">Patients</div>
              <div class="preview-nav-item">Billing</div>
            </div>
            <div class="preview-content">
              <div class="preview-card">
                <div class="preview-card-header" [style.color]="branding.primaryColor">Today's Overview</div>
                <div class="preview-stat-row">
                  <div class="preview-stat">
                    <div class="preview-stat-value" [style.color]="branding.primaryColor">12</div>
                    <div class="preview-stat-label">Patients</div>
                  </div>
                  <div class="preview-stat">
                    <div class="preview-stat-value" [style.color]="branding.secondaryColor">8</div>
                    <div class="preview-stat-label">Appointments</div>
                  </div>
                  <div class="preview-stat">
                    <div class="preview-stat-value" [style.color]="branding.accentColor">3</div>
                    <div class="preview-stat-label">Pending</div>
                  </div>
                </div>
              </div>
              <div class="preview-button" [style.background]="branding.primaryColor">New Appointment</div>
              <div class="preview-accent-bar" [style.background]="branding.accentColor"></div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </p-card>

  <!-- Doctor Profile -->
  <p-card styleClass="settings-card mb-4">
    <ng-template #header>
      <div class="card-header-custom">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
        <span>Doctor / Professional Profile</span>
      </div>
    </ng-template>
    <div class="row g-3">
      <div class="col-md-6">
        <label class="form-label">Full Name</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="doctor.name" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Qualification</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="doctor.qualification" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Registration Number</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="doctor.registrationNo" />
      </div>
      <div class="col-md-6">
        <label class="form-label">Specialization</label>
        <input type="text" pInputText class="w-100" [(ngModel)]="doctor.specialization" />
      </div>
    </div>
  </p-card>

  <!-- Save Button -->
  <div class="d-flex justify-content-end">
    <p-button
      label="Save Changes"
      icon="pi pi-check"
      (onClick)="saveSettings()"
      [loading]="saving()"
    />
  </div>
</div>
