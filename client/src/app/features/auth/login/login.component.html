<div class="login-page d-flex min-vh-100">
  <!-- Left Panel -->
  <div class="left-panel d-none d-md-flex flex-column justify-content-center align-items-center text-white p-5">
    <div class="text-center">
      <svg class="mb-4" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
        <path d="M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4"/>
        <circle cx="20" cy="10" r="2"/>
      </svg>
      <h2 class="fw-bold mb-3">Doctors Office</h2>
      <p class="opacity-75" style="max-width: 300px;">Modern clinic management designed for Indian healthcare practices.</p>
    </div>
  </div>

  <!-- Right Panel -->
  <div class="right-panel flex-grow-1 d-flex align-items-center justify-content-center p-4">
    <div class="login-form w-100" style="max-width: 400px;">
      <h3 class="fw-bold mb-1">Welcome back</h3>
      <p class="text-secondary mb-4">Sign in with your mobile number</p>

      @if (error()) {
        <div class="alert alert-danger py-2 px-3 small">{{ error() }}</div>
      }

      @if (step() === 'phone') {
        <div class="mb-3">
          <label class="form-label small fw-medium" for="phone">Mobile Number</label>
          <div class="d-flex align-items-center gap-2">
            <span class="input-prefix text-secondary fw-medium">+91</span>
            <input
              pInputText
              id="phone"
              type="tel"
              class="w-100"
              placeholder="Enter 10-digit number"
              [value]="phone()"
              (input)="onPhoneInput($event)"
              maxlength="10"
            />
          </div>
        </div>
        <p-button
          label="Send OTP"
          styleClass="w-100"
          [loading]="loading()"
          (onClick)="sendOtp()"
        />
      }

      @if (step() === 'otp') {
        <div class="mb-2">
          <label class="form-label small fw-medium">Mobile Number</label>
          <p class="text-secondary small mb-3">OTP sent to +91 {{ phone() }}</p>
        </div>
        <div class="mb-3">
          <label class="form-label small fw-medium" for="otp">Enter OTP</label>
          <input
            pInputText
            id="otp"
            type="text"
            class="w-100"
            placeholder="6-digit OTP"
            [value]="otp()"
            (input)="onOtpInput($event)"
            maxlength="6"
          />
        </div>
        <p-button
          label="Verify & Sign In"
          styleClass="w-100"
          [loading]="loading()"
          (onClick)="verifyOtp()"
        />
        <button class="btn btn-link btn-sm text-secondary mt-2 p-0" (click)="step.set('phone')">
          Change number
        </button>
      }

      <p class="text-center mt-4 mb-0 small text-secondary">
        Don't have an account?
        <a routerLink="/register" class="text-decoration-none fw-medium link-primary">Register</a>
      </p>
    </div>
  </div>
</div>
