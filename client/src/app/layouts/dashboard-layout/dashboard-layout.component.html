<div class="dashboard-layout d-flex">
  <!-- Sidebar -->
  <aside class="sidebar d-flex flex-column">
    <!-- Brand -->
    <div class="sidebar-brand d-flex align-items-center px-3 py-3">
      <svg class="me-2" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4.8 2.3A.3.3 0 1 0 5 2H4a2 2 0 0 0-2 2v5a6 6 0 0 0 6 6 6 6 0 0 0 6-6V4a2 2 0 0 0-2-2h-1a.2.2 0 1 0 .3.3"/>
        <path d="M8 15v1a6 6 0 0 0 6 6 6 6 0 0 0 6-6v-4"/>
        <circle cx="20" cy="10" r="2"/>
      </svg>
      <span class="fw-bold">Doctors Office</span>
    </div>

    <!-- Nav Links -->
    <nav class="sidebar-nav flex-grow-1 px-2 py-2">
      <a routerLink="/dashboard" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7" rx="1"/>
          <rect x="14" y="3" width="7" height="7" rx="1"/>
          <rect x="3" y="14" width="7" height="7" rx="1"/>
          <rect x="14" y="14" width="7" height="7" rx="1"/>
        </svg>
        <span>Dashboard</span>
      </a>
      <a routerLink="/patients" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M23 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Patients</span>
      </a>
      <a routerLink="/appointments" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
          <line x1="16" y1="2" x2="16" y2="6"/>
          <line x1="8" y1="2" x2="8" y2="6"/>
          <line x1="3" y1="10" x2="21" y2="10"/>
        </svg>
        <span>Appointments</span>
      </a>
      <a routerLink="/prescriptions" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/>
          <polyline points="14 2 14 8 20 8"/>
          <line x1="16" y1="13" x2="8" y2="13"/>
          <line x1="16" y1="17" x2="8" y2="17"/>
          <polyline points="10 9 9 9 8 9"/>
        </svg>
        <span>Prescriptions</span>
      </a>
      <a routerLink="/billing" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="1" x2="12" y2="23"/>
          <path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/>
        </svg>
        <span>Billing</span>
      </a>
      <a routerLink="/team" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/>
          <circle cx="9" cy="7" r="4"/>
          <path d="M22 21v-2a4 4 0 0 0-3-3.87"/>
          <path d="M16 3.13a4 4 0 0 1 0 7.75"/>
        </svg>
        <span>Team</span>
      </a>
      <a routerLink="/settings" routerLinkActive="active" class="nav-item d-flex align-items-center px-3 py-2 rounded-3 mb-1 text-decoration-none">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
        </svg>
        <span>Settings</span>
      </a>
    </nav>

    <!-- Sign Out -->
    <div class="sidebar-footer px-2 py-3">
      <button class="nav-item d-flex align-items-center px-3 py-2 rounded-3 w-100 border-0 bg-transparent text-start" (click)="signOut()">
        <svg class="nav-icon me-3" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
          <polyline points="16 17 21 12 16 7"/>
          <line x1="21" y1="12" x2="9" y2="12"/>
        </svg>
        <span>Sign out</span>
      </button>
    </div>
  </aside>

  <!-- Main Content -->
  <div class="main-area flex-grow-1 d-flex flex-column">
    <!-- Header -->
    <header class="top-header d-flex align-items-center justify-content-between px-4 py-2">
      <div class="page-title">
        <!-- Page title can be set by child routes if needed -->
      </div>
      <div class="header-actions d-flex align-items-center gap-3">
        <!-- Notification Bell -->
        <button class="btn btn-icon position-relative p-1 border-0 bg-transparent" aria-label="Notifications">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="var(--do-text-secondary)" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notification-dot position-absolute"></span>
        </button>

        <!-- User Avatar -->
        <div class="position-relative">
          <button class="user-avatar-btn d-flex align-items-center gap-2 border-0 bg-transparent p-0" (click)="toggleUserMenu()">
            <div class="avatar-circle d-flex align-items-center justify-content-center fw-bold">
              {{ doctorInitials }}
            </div>
            <span class="d-none d-lg-inline small fw-medium text-secondary">{{ doctorShortName }}</span>
          </button>

          @if (showUserMenu()) {
            <div class="user-dropdown position-absolute end-0 mt-2 py-1 rounded-3 shadow-sm">
              <a routerLink="/settings" class="dropdown-item px-3 py-2 d-flex align-items-center gap-2 text-decoration-none" (click)="closeUserMenu()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="3"/>
                  <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/>
                </svg>
                Settings
              </a>
              <button class="dropdown-item px-3 py-2 d-flex align-items-center gap-2 w-100 border-0 bg-transparent text-start" (click)="signOut()">
                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
                  <polyline points="16 17 21 12 16 7"/>
                  <line x1="21" y1="12" x2="9" y2="12"/>
                </svg>
                Sign out
              </button>
            </div>
          }
        </div>
      </div>
    </header>

    <!-- Content -->
    <main class="content-area flex-grow-1 p-4">
      <router-outlet />
    </main>
  </div>
</div>
