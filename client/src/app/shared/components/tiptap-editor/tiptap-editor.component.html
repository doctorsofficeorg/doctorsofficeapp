<div class="tiptap-editor-wrapper">
  <div class="toolbar">
    <button type="button" class="toolbar-btn" [class.active]="isActive('bold')" (click)="toggleBold()" title="Bold">
      <strong>B</strong>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isActive('italic')" (click)="toggleItalic()" title="Italic">
      <em>I</em>
    </button>
    <span class="toolbar-divider"></span>
    <button type="button" class="toolbar-btn" [class.active]="isActive('bulletList')" (click)="toggleBulletList()" title="Bullet List">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/>
        <circle cx="4" cy="6" r="1.5" fill="currentColor"/><circle cx="4" cy="12" r="1.5" fill="currentColor"/><circle cx="4" cy="18" r="1.5" fill="currentColor"/>
      </svg>
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isActive('orderedList')" (click)="toggleOrderedList()" title="Ordered List">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <line x1="10" y1="6" x2="20" y2="6"/><line x1="10" y1="12" x2="20" y2="12"/><line x1="10" y1="18" x2="20" y2="18"/>
        <text x="2" y="8" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">1</text>
        <text x="2" y="14" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">2</text>
        <text x="2" y="20" font-size="8" fill="currentColor" stroke="none" font-family="sans-serif">3</text>
      </svg>
    </button>
    <span class="toolbar-divider"></span>
    <button type="button" class="toolbar-btn" [class.active]="isActive('heading', { level: 1 })" (click)="setHeading(1)" title="Heading 1">
      H1
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isActive('heading', { level: 2 })" (click)="setHeading(2)" title="Heading 2">
      H2
    </button>
    <button type="button" class="toolbar-btn" [class.active]="isActive('heading', { level: 3 })" (click)="setHeading(3)" title="Heading 3">
      H3
    </button>
  </div>
  <div #editorContainer class="editor-content"></div>
</div>
