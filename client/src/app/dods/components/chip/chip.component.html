@let _icon = icon();
@if (_icon) { <i [class]="_icon + ' dods-chip__icon'" aria-hidden="true"></i> }
<span class="dods-chip__label"><ng-content /></span>
@if (removable()) {
  <button
    type="button"
    class="dods-chip__remove"
    [disabled]="disabled()"
    (click)="onRemove($event)"
    aria-label="Remove"
  >
    <i class="pi pi-times" aria-hidden="true"></i>
  </button>
}
