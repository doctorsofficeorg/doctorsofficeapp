<div class="auth-layout">
  <!-- Left Panel — Branding -->
  <div class="auth-layout__left">
    <div class="auth-layout__left-content">
      <a routerLink="/" class="auth-layout__brand">
        <svg class="auth-layout__brand-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M12 6c0-3 2.5-5 5-3s2 5 0 7l-5 5" transform="translate(-1 -1) scale(1.1)"/>
          <line x1="12" y1="2" x2="12" y2="8"/>
          <line x1="9" y1="5" x2="15" y2="5"/>
        </svg>
        <span>Doctors Office</span>
      </a>
      <h1 class="auth-layout__heading">Start your free account</h1>
      <p class="auth-layout__subtext">
        Join thousands of doctors who manage their clinics effortlessly with Doctors Office.
      </p>
    </div>
  </div>

  <!-- Right Panel — Form -->
  <div class="auth-layout__right">
    <div class="auth-layout__form-wrapper">
      <div class="auth-layout__form-header">
        <h2 class="auth-layout__form-title">Create your account</h2>
        <p class="auth-layout__form-subtitle">
          Already have an account?
          <a routerLink="/login" class="auth-layout__link">Sign in</a>
        </p>
      </div>

      <form method="post" class="auth-form" (ngSubmit)="onSubmit()">
        <!-- Google OAuth (placeholder) -->
        <button type="button" class="auth-form__oauth" disabled>
          <svg class="auth-form__oauth-icon" viewBox="0 0 24 24" aria-hidden="true">
            <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1Z" fill="#4285F4"/>
            <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23Z" fill="#34A853"/>
            <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84Z" fill="#FBBC05"/>
            <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53Z" fill="#EA4335"/>
          </svg>
          Continue with Google
        </button>

        <div class="auth-form__divider">
          <span>or register with email</span>
        </div>

        <!-- Full Name -->
        <div class="auth-form__field">
          <label for="fullName" class="auth-form__label">Full name</label>
          <input
            id="fullName"
            type="text"
            class="input-base"
            placeholder="Dr. Jane Smith"
            autocomplete="name"
            required
            [ngModel]="fullName()"
            (ngModelChange)="fullName.set($event)"
            name="fullName"
          />
        </div>

        <!-- Email -->
        <div class="auth-form__field">
          <label for="email" class="auth-form__label">Email address</label>
          <input
            id="email"
            type="email"
            class="input-base"
            placeholder="you@clinic.com"
            autocomplete="email"
            required
            [ngModel]="email()"
            (ngModelChange)="email.set($event)"
            name="email"
          />
        </div>

        <!-- Password -->
        <div class="auth-form__field">
          <label for="password" class="auth-form__label">Password</label>
          <input
            id="password"
            type="password"
            class="input-base"
            placeholder="Create a strong password"
            autocomplete="new-password"
            required
            [ngModel]="password()"
            (ngModelChange)="password.set($event)"
            name="password"
          />
        </div>

        <!-- Confirm Password -->
        <div class="auth-form__field">
          <label for="confirmPassword" class="auth-form__label">Confirm password</label>
          <input
            id="confirmPassword"
            type="password"
            class="input-base"
            placeholder="Re-enter your password"
            autocomplete="new-password"
            required
            [ngModel]="confirmPassword()"
            (ngModelChange)="confirmPassword.set($event)"
            name="confirmPassword"
          />
        </div>

        <!-- Submit -->
        <button
          type="submit"
          class="auth-form__submit"
          [disabled]="isSubmitting()"
        >
          @if (isSubmitting()) {
            Creating account...
          } @else {
            Create Account
          }
        </button>
      </form>
    </div>
  </div>
</div>
